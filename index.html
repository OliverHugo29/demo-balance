<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Overview</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .account-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 350px;
            text-align: center;
        }

        .greeting {
            color: #1e293b;
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0 0 15px 0;
        }

        .balance-label {
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .balance-amount {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f172a;
            margin: 10px 0 25px 0;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }

        .btn-deposit {
            background-color: #10b981;
        }

        .btn-spend {
            background-color: #ef4444;
        }
    </style>
</head>
<body>

    <div class="account-card">
        <h2 class="greeting">Hi Oliver</h2>
        <p class="balance-label">Available Balance (USD)</p>
        <div class="balance-amount">$360,000.00</div>

        <div class="input-group">
            <input type="number" placeholder="Amount ($)">
        </div>

        <div class="btn-group">
            <button class="btn-deposit">Deposit (+)</button>
            <button class="btn-spend">Spend (-)</button>
        </div>
    </div>

</body>
</html>
