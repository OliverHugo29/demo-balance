<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #f4f6f8; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 350px; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .bal-box { background: #00b074; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00b074; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .clear-btn { background: #ff4d4d; } /* Red button to stand out */
        #history { margin-top: 20px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <div class="bal-box">
        <p>Available Balance</p>
        <h1 id="balance">₦0.00</h1>
    </div>

    <input id="desc" placeholder="Transaction Name">
    <input id="amount" type="number" placeholder="Amount (₦)">
    <button onclick="addEntry()">Add Transaction</button>
    <button class="clear-btn" onclick="clearAll()">Clear All / Reset</button>

    <div id="history">
        <h3>History</h3>
    </div>
</div>

<script>
    let bal = 0;
    
    function addEntry() {
        let desc = document.getElementById('desc').value;
        let amt = parseFloat(document.getElementById('amount').value);
        if(desc && !isNaN(amt)) {
            bal += amt;
            document.getElementById('balance').innerText = '₦' + bal.toLocaleString();
            let p = document.createElement('p');
            p.innerText = desc + ': ₦' + amt;
            document.getElementById('history').prepend(p);
        }
    }

    function clearAll() {
        bal = 0;
        document.getElementById('balance').innerText = '₦0.00';
        document.getElementById('history').innerHTML = '<h3>History</h3>';
    }
</script>
</body>
</html>
