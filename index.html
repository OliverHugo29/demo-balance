<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Portal</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .app-card { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; color: #333; }
        .balance { font-size: 2rem; font-weight: bold; margin: 10px 0; color: #000; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .history { margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
        .item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>Oliver's Financial Portal</h1>
    <div class="balance" id="balance">$300,000</div>
    
    <input type="text" id="desc" placeholder="Transaction Name">
    <input type="number" id="amount" placeholder="Amount">
    <button onclick="updateBalance()">Add Transaction</button>

    <div class="history">
        <h3>Recent Activity</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    let currentBalance = 300000;
    function updateBalance() {
        let desc = document.getElementById('desc').value;
        let amount = parseFloat(document.getElementById('amount').value);
        if(desc && !isNaN(amount)) {
            currentBalance += amount;
            document.getElementById('balance').innerText = '$' + currentBalance.toLocaleString();
            let div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span>${desc}</span> <span>$${amount.toLocaleString()}</span>`;
            document.getElementById('historyList').prepend(div);
        }
    }
</script>
</body>
</html>
