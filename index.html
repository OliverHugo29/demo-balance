<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .dashboard-card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            min-width: 300px;
            border: 1px solid #333;
        }
        .welcome-text {
            font-size: 1.2rem;
            color: #aaaaaa;
            margin-bottom: 10px;
        }
        .user-name {
            font-size: 2rem;
            color: #4caf50;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .balance-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }
        .balance-amount {
            font-size: 3rem;
            font-weight: bold;
            color: #ffffff;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="welcome-text">Welcome back,</div>
        <div class="user-name" id="username">Oliver</div>
        
        <div class="balance-label">Available Balance</div>
        <div class="balance-amount" id="balance">$7,000,000</div>
    </div>

    <script>
        // Data variables
        const accountHolder = "Oliver";
        const totalBalance = 7000000;

        // Automatically format and inject the values safely into the website UI
        document.getElementById('username').textContent = accountHolder;
        document.getElementById('balance').textContent = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            maximumFractionDigits: 0
        }).format(totalBalance);
    </script>

</body>
</html>
