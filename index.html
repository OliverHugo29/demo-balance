<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .app { width: 100%; max-width: 400px; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .balance-section { text-align: center; margin-bottom: 30px; }
        .balance-value { font-size: 2.5rem; font-weight: 800; color: #1a1a1a; margin: 10px 0; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-credit { background: #00b074; color: white; }
        .btn-debit { background: #ff4d4d; color: white; }
        .history-list { margin-top: 20px; }
        .transaction { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .neg { color: #ff4d4d; }
        .pos { color: #00b074; }
    </style>
</head>
<body>

<div class="app">
    <div class="balance-section">
        <p>Available Balance (USD)</p>
        <div class="balance-value" id="balance">$360,000.00</div>
    </div>

    <div class="input-group">
        <input id="desc" placeholder="Transaction Description">
        <input id="amount" type="number" placeholder="Amount ($)">
        <div class="btn-row">
            <button class="btn-credit" onclick="process(true)">Deposit (+)</button>
            <button class="btn-debit" onclick="process(false)">Spend (-)</button>
        </div>
    </div>

    <div class="history-list" id="history">
        <strong>Transaction History</strong>
    </div>
</div>

<script>
    let bal = 360000;
    function process(isDeposit) {
        let desc = document.getElementById('desc').value || "General Transaction";
        let amt = parseFloat(document.getElementById('amount').value);
        if(!isNaN(amt)) {
            bal = isDeposit ? bal + amt : bal - amt;
            document.getElementById('balance').innerText = '$' + bal.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            let div = document.createElement('div');
            div.className = 'transaction';
            div.innerHTML = `<span>${desc}</span> <span class="${isDeposit ? 'pos' : 'neg'}">${isDeposit ? '+' : '-'}$${amt.toLocaleString()}</span>`;
            document.getElementById('history').prepend(div);
            
            document.getElementById('desc').value = "";
            document.getElementById('amount').value = "";
        }
    }
</script>
</body>
</html>
